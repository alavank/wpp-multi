services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wpp
      POSTGRES_PASSWORD: wpp
      POSTGRES_DB: wpp_multi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/api/prisma/migrations/20260504000000_init/migration.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./apps/api/prisma/rls.sql:/docker-entrypoint-initdb.d/02_rls.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wpp -d wpp_multi"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://wpp:wpp@postgres:5432/wpp_multi?schema=public
      DIRECT_URL: postgresql://wpp:wpp@postgres:5432/wpp_multi?schema=public
      API_HOST: 0.0.0.0
      API_PORT: "3333"
      API_CORS_ORIGIN: "http://localhost:8080"
      LOG_LEVEL: info
      BAILEYS_AUTH_DIR: /data/baileys-auth
      MEDIA_STORE_DIR: /data/media-store
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
    volumes:
      - apidata:/data
    ports:
      - "3333:3333"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3333
        VITE_SUPABASE_URL: ${SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  pgdata:
  apidata:
